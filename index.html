<!DOCTYPE html>
<html>
<head>
    <title>Chalo's data base</title>
    <meta charset="utf-8">
</head>
<body>
    <h2>Chalo's data base</h2>
    <div id="login">
        <input type="text" id="login" placeholder="Логин"><br>
        <input type="password" id="password" placeholder="Пароль"><br>
        <button onclick="doLogin()">Войти</button>
        <div id="error" style="color:red;"></div>
    </div>
    <div id="content" style="display:none;">
        <p>Добро пожаловать, <span id="user"></span>!</p>
        <button onclick="logout()">Выйти</button>
        <div id="buttons"></div>
        <div id="textBlock"></div>
    </div>
    <script>
        const USERS = {
            "sup3rich": "X8vK2mQ",
            "NeonCGsigmapokoyoGames": "7xK9mP2",
            "Major": "R4tY8wQ3",
            "sigeonpex": "Z5nH1vB6",
            "grisha228": "F2cL9uA7",
            "KartelKartelovich": "W8jG3sD4",
            "Akula998pokoyo": "M6qE2rX5",
            "Art1k": "Yh3Km9x"
        };

        async function loadButtons() {
            const resp = await fetch("buttons.txt");
            const text = await resp.text();
            const lines = text.split("\n");
            const btns = [];
            for (let line of lines) {
                line = line.trim();
                if (line && line.includes("|")) {
                    let [name, file] = line.split("|");
                    btns.push({ name: name.trim(), file: file.trim() });
                }
            }
            return btns;
        }

        async function showText(file) {
            const resp = await fetch(`texts/${file}`);
            const text = await resp.text();
            document.getElementById("textBlock").innerHTML = `<pre>${text}</pre>`;
        }

        async function doLogin() {
            const login = document.getElementById("login").value.trim();
            const pass = document.getElementById("password").value;
            if (USERS[login] && USERS[login] === pass) {
                document.getElementById("login").style.display = "none";
                document.getElementById("content").style.display = "block";
                document.getElementById("user").innerText = login;
                const buttons = await loadButtons();
                const container = document.getElementById("buttons");
                container.innerHTML = "";
                for (let btn of buttons) {
                    let b = document.createElement("button");
                    b.innerText = btn.name;
                    b.onclick = () => showText(btn.file);
                    container.appendChild(b);
                    container.appendChild(document.createElement("br"));
                }
            } else {
                document.getElementById("error").innerText = "Неверный логин или пароль";
            }
        }

        function logout() {
            document.getElementById("login").style.display = "block";
            document.getElementById("content").style.display = "none";
            document.getElementById("login").value = "";
            document.getElementById("password").value = "";
            document.getElementById("error").innerText = "";
        }
    </script>
</body>
</html>
